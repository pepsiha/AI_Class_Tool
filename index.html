<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 技術讀書會・課堂互動工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Microsoft JhengHei','微軟正黑體','Noto Sans TC','Segoe UI',sans-serif; background: #EFF6FF; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
  .container { max-width: 640px; width: 100%; }
  .header { text-align: center; margin-bottom: 40px; }
  .eyebrow { font-size: 0.85rem; color: #3B82F6; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; }
  .title { font-size: 2rem; font-weight: 800; color: #0D2744; line-height: 1.3; }
  .subtitle { font-size: 1rem; color: #475569; margin-top: 8px; }
  .divider { width: 48px; height: 4px; background: linear-gradient(90deg,#3B82F6,#0D9488); border-radius: 2px; margin: 18px auto 0; }
  .sessions { display: flex; flex-direction: column; gap: 14px; }
  .session-card { background: white; border-radius: 14px; border: 1px solid #BFDBFE; padding: 20px 24px; display: flex; align-items: center; gap: 18px; text-decoration: none; color: inherit; transition: all 0.2s; box-shadow: 0 1px 4px rgba(37,99,235,0.07); }
  .session-card:hover { border-color: #3B82F6; box-shadow: 0 4px 16px rgba(37,99,235,0.15); transform: translateY(-2px); }
  .session-card.disabled { opacity: 0.4; pointer-events: none; }
  .session-num { background: #1A3A5C; color: white; width: 52px; height: 52px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 800; flex-shrink: 0; }
  .session-num.active { background: #2563EB; }
  .session-info { flex: 1; }
  .session-label { font-size: 0.78rem; font-weight: 700; color: #3B82F6; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .session-name { font-size: 1.08rem; font-weight: 700; color: #0D2744; }
  .session-desc { font-size: 0.88rem; color: #64748B; margin-top: 3px; }
  .session-badge { font-size: 0.78rem; font-weight: 700; padding: 5px 12px; border-radius: 20px; white-space: nowrap; }
  .badge-ready { background: #DBEAFE; color: #1D4ED8; }
  .badge-soon { background: #F1F5F9; color: #94A3B8; }
  .footer { text-align: center; margin-top: 36px; font-size: 0.82rem; color: #94A3B8; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="eyebrow">電光所 AI 技術讀書會</div>
    <div class="title">AI 深度研究 × 精準簡報製作</div>
    <div class="subtitle">選擇課堂場次開始使用</div>
    <div class="divider"></div>
  </div>
  <div class="sessions">
    <a href="1st.html" class="session-card">
      <div class="session-num active">1</div>
      <div class="session-info">
        <div class="session-label">第一場</div>
        <div class="session-name">AI 深度研究 × 精準簡報製作</div>
      </div>
      <div class="session-badge badge-ready">✓ 已備妥</div>
    </a>
    <div class="session-card disabled">
      <div class="session-num">2</div>
      <div class="session-info">
        <div class="session-label">第二場</div>
        <div class="session-name">工程師版 GEM / Prompt 設計</div>
      </div>
      <div class="session-badge badge-soon">即將推出</div>
    </div>
    <div class="session-card disabled">
      <div class="session-num">3</div>
      <div class="session-info">
        <div class="session-label">第三場</div>
        <div class="session-name">無程式式 AI Agent Flow 共創</div>
      </div>
      <div class="session-badge badge-soon">即將推出</div>
    </div>
    <div class="session-card disabled">
      <div class="session-num">4</div>
      <div class="session-info">
        <div class="session-label">第四場</div>
        <div class="session-name">AI 工具可信度與品質控管</div>
      </div>
      <div class="session-badge badge-soon">即將推出</div>
    </div>
  </div>
  <div class="footer">電光所 AI 讀書會・主持人：PEPSI</div>
</div>
</body>
</html>
