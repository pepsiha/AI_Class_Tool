<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 讀書會・第一場・課堂互動工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue-darkest: #0D2744;
    --blue-dark:    #1A3A5C;
    --blue-mid:     #2563EB;
    --blue-accent:  #3B82F6;
    --blue-light:   #DBEAFE;
    --blue-pale:    #EFF6FF;
    --teal:         #0D9488;
    --amber:        #D97706;
    --amber-light:  #FEF3C7;
    --green:        #059669;
    --red-light:    #FEF2F2;
    --text-dark:    #1E293B;
    --text-mid:     #475569;
    --text-light:   #94A3B8;
    --border:       #BFDBFE;
    --white:        #FFFFFF;
  }
  html, body { height: 100%; font-family: 'Microsoft JhengHei','微軟正黑體','Noto Sans TC','Segoe UI',sans-serif; background: var(--blue-pale); color: var(--text-dark); overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* HEADER */
  #header { background: var(--blue-darkest); color: white; padding: 12px 32px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-bottom: 3px solid var(--blue-accent); }
  #header-left { display: flex; flex-direction: column; gap: 2px; }
  #section-label { font-size: 0.78rem; color: #93C5FD; letter-spacing: 0.06em; text-transform: uppercase; }
  #page-title { font-size: 1.35rem; font-weight: 700; }
  #progress-badge { background: var(--blue-accent); color: white; font-size: 1.15rem; font-weight: 700; padding: 7px 20px; border-radius: 24px; }

  /* MAIN */
  #main { flex: 1; overflow-y: auto; padding: 20px 36px; display: flex; flex-direction: column; gap: 14px; min-height: 0; }
  .card { background: var(--white); border-radius: 12px; padding: 20px 26px; border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(37,99,235,0.06); }

  /* COVER */
  .cover-wrap { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 8px 0; gap: 16px; }
  .cover-eyebrow { font-size: 0.85rem; color: var(--blue-accent); font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
  .cover-title { font-size: 2.6rem; font-weight: 800; color: var(--blue-darkest); line-height: 1.2; }
  .cover-subtitle { font-size: 1.2rem; color: var(--blue-mid); font-weight: 600; }
  .cover-meta { font-size: 1rem; color: var(--text-mid); display: flex; gap: 24px; }
  .cover-divider { width: 60px; height: 4px; background: linear-gradient(90deg,var(--blue-accent),var(--teal)); border-radius: 2px; }
  .goals-list { width: 100%; max-width: 560px; text-align: left; }
  .goal-item { display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 1rem; }
  .goal-item:last-child { border-bottom: none; }
  .goal-num { background: var(--blue-mid); color: white; min-width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.82rem; flex-shrink: 0; margin-top: 1px; }

  /* AGENDA */
  .agenda-table { width: 100%; border-collapse: collapse; }
  .agenda-table th { background: var(--blue-darkest); color: white; padding: 10px 14px; text-align: left; font-weight: 700; font-size: 0.88rem; }
  .agenda-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 0.97rem; vertical-align: top; line-height: 1.5; }
  .agenda-table tr:nth-child(even) td { background: var(--blue-pale); }
  .agenda-num { background: var(--blue-mid); color: white; width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem; margin-right: 6px; }
  .agenda-time { color: var(--blue-accent); font-weight: 700; white-space: nowrap; }
  .agenda-goal { font-size: 0.83rem; color: var(--text-mid); margin-top: 2px; }

  /* AUDIENCE INTRO SLIDES */
  .audience-slide { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 18px; padding: 16px 16px; }
  .audience-eyebrow { font-size: 0.8rem; font-weight: 700; color: var(--blue-accent); letter-spacing: 0.12em; text-transform: uppercase; }
  .audience-num { width: 52px; height: 52px; background: var(--blue-mid); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; }
  .audience-title { font-size: 1.9rem; font-weight: 800; color: var(--blue-darkest); line-height: 1.3; max-width: 640px; }
  .audience-sub { font-size: 1.05rem; color: var(--text-mid); max-width: 540px; line-height: 1.65; }
  .audience-divider { width: 48px; height: 4px; background: linear-gradient(90deg,var(--blue-accent),var(--teal)); border-radius: 2px; }
  .audience-context { background: var(--blue-pale); border: 1px solid var(--border); border-radius: 10px; padding: 14px 24px; max-width: 580px; width: 100%; font-size: 1.05rem; color: var(--blue-dark); line-height: 1.8; }

  /* PROJECTED QUESTION (投影文字) */
  .projected-q { background: var(--blue-pale); border-left: 5px solid var(--blue-accent); border-radius: 0 10px 10px 0; padding: 18px 24px; font-size: 1.5rem; font-weight: 700; color: var(--blue-darkest); line-height: 1.55; }
  .projected-hint { font-size: 0.95rem; color: var(--text-mid); font-style: italic; margin-top: 8px; }

  /* SECTION META */
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .section-time-badge { background: var(--blue-light); color: var(--blue-mid); font-size: 0.8rem; font-weight: 700; padding: 4px 12px; border-radius: 12px; white-space: nowrap; }
  .section-h { font-size: 1.1rem; font-weight: 700; color: var(--blue-dark); }

  /* PROGRESSIVE REVEAL */
  .reveal-container { display: flex; flex-direction: column; gap: 10px; }
  .reveal-item { background: var(--blue-pale); border: 1px solid var(--border); border-left: 4px solid var(--blue-accent); border-radius: 0 8px 8px 0; padding: 14px 20px; font-size: 1.2rem; font-weight: 700; color: var(--blue-darkest); display: none; animation: fadeIn 0.4s ease; line-height: 1.55; }
  .reveal-item.visible { display: block; }
  .reveal-item-hint { font-size: 0.85rem; color: var(--text-mid); font-weight: 400; margin-top: 6px; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .reveal-controls { display: flex; gap: 10px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
  .reveal-btn { padding: 9px 22px; background: var(--blue-accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.93rem; font-weight: 600; font-family: inherit; transition: background 0.2s; }
  .reveal-btn:hover { background: var(--blue-mid); }
  .reveal-btn:disabled { background: var(--text-light); cursor: default; }
  .reveal-reset-btn { padding: 9px 14px; background: white; color: var(--text-mid); border: 2px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 0.83rem; font-weight: 600; font-family: inherit; transition: all 0.2s; }
  .reveal-reset-btn:hover { border-color: #F87171; color: #DC2626; }
  .reveal-counter { font-size: 0.88rem; color: var(--text-mid); }

  /* FLOW DIAGRAM */
  .flow-diagram { display: flex; align-items: center; gap: 0; margin: 8px 0; overflow-x: auto; }
  .flow-step { background: var(--blue-dark); color: white; padding: 12px 14px; text-align: center; font-size: 0.93rem; font-weight: 700; flex: 1; min-width: 90px; position: relative; }
  .flow-step:not(:last-child)::after { content: ''; position: absolute; right: -11px; top: 50%; transform: translateY(-50%); width: 0; height: 0; border-top: 20px solid transparent; border-bottom: 20px solid transparent; border-left: 12px solid; z-index: 1; }
  .flow-step:nth-child(1) { background:#1D4ED8; } .flow-step:nth-child(1)::after { border-left-color:#1D4ED8; }
  .flow-step:nth-child(2) { background:#1E40AF; } .flow-step:nth-child(2)::after { border-left-color:#1E40AF; }
  .flow-step:nth-child(3) { background:#1E3A8A; } .flow-step:nth-child(3)::after { border-left-color:#1E3A8A; }
  .flow-step:nth-child(4) { background:#1E3070; } .flow-step:nth-child(4)::after { border-left-color:#1E3070; }
  .flow-step:nth-child(5) { background:#172554; }
  .flow-step-sub { font-size: 0.72rem; opacity: 0.75; font-weight: 400; margin-top: 3px; }

  /* TWO-COLUMN GUIDE */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 8px 0; }
  .col-box { border-radius: 8px; padding: 14px 16px; }
  .col-box-red { background: #FEF2F2; border: 1px solid #FECACA; }
  .col-box-green { background: #F0FDF4; border: 1px solid #BBF7D0; }
  .col-title { font-size: 0.88rem; font-weight: 700; margin-bottom: 8px; }
  .col-title-red { color: #DC2626; }
  .col-title-green { color: #059669; }
  .col-item { font-size: 0.88rem; color: var(--text-mid); padding: 3px 0; border-bottom: 1px solid rgba(0,0,0,0.06); line-height: 1.5; }
  .col-item:last-child { border-bottom: none; }

  /* TOOL ALIGNMENT TABLE */
  .tool-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
  .tool-table th { background: var(--blue-dark); color: white; padding: 10px 14px; text-align: left; font-weight: 700; }
  .tool-table td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .tool-table tr:nth-child(even) td { background: var(--blue-pale); }
  .tool-table tr:last-child td { background: #F1F5F9; color: var(--text-mid); font-style: italic; }
  .step-num { background: var(--blue-mid); color: white; width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem; margin-right: 8px; }
  .step-fixed { color: var(--text-mid); font-size: 0.85rem; }

  /* ASSIGNMENT */
  .assign-q { display: flex; gap: 12px; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid var(--border); font-size: 1.05rem; }
  .assign-q:last-child { border-bottom: none; }
  .assign-num { background: var(--amber); color: white; min-width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; margin-top: 1px; }
  .assign-line { margin-top: 6px; border: none; border-bottom: 1px dashed var(--text-light); width: 100%; display: block; }
  .hw-box { background: var(--amber-light); border: 2px solid #F59E0B; border-radius: 10px; padding: 16px 22px; }
  .hw-title { font-size: 1rem; font-weight: 700; color: var(--amber); margin-bottom: 10px; }

  /* SITUATION TABLE */
  .sit-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  .sit-table th { background: var(--blue-dark); color: white; padding: 9px 12px; text-align: left; font-weight: 700; }
  .sit-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.55; }
  .sit-table tr:nth-child(even) td { background: var(--blue-pale); }
  .sit-table .say { font-style: italic; color: var(--blue-dark); }

  /* CLOSING */
  .closing-wrap { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 16px; padding: 6px 0; }
  .closing-icon { font-size: 3rem; }
  .closing-statement { font-size: 1.5rem; font-weight: 700; color: var(--blue-dark); line-height: 1.4; max-width: 600px; }
  .closing-card { background: var(--blue-pale); border: 1px solid var(--border); border-radius: 12px; padding: 16px 28px; max-width: 520px; width: 100%; text-align: left; }
  .closing-reminder { font-size: 0.97rem; color: var(--text-mid); line-height: 1.9; }
  .closing-reminder strong { color: var(--blue-dark); }

  /* SUMMARY */
  .summary-entry { margin-bottom: 16px; }
  .summary-entry-title { font-size: 0.93rem; font-weight: 700; color: var(--blue-mid); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .summary-entry-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .summary-content { background: var(--blue-pale); border-radius: 8px; padding: 12px 14px; font-size: 0.97rem; line-height: 1.7; white-space: pre-wrap; min-height: 36px; }
  .summary-empty { color: var(--text-light); font-style: italic; }
  .export-bar { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .export-btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.93rem; font-weight: 600; font-family: inherit; }
  .export-copy { background: var(--green); color: white; }
  .export-print { background: var(--blue-mid); color: white; }
  .copy-feedback { font-size: 0.85rem; color: var(--green); font-weight: 600; opacity: 0; transition: opacity 0.3s; }
  .copy-feedback.show { opacity: 1; }

  /* WHITEBOARD */
  .whiteboard-wrap { display: flex; flex-direction: column; gap: 6px; }
  .whiteboard-label { font-size: 0.82rem; font-weight: 700; color: var(--blue-mid); letter-spacing: 0.04em; text-transform: uppercase; }
  .whiteboard { width: 100%; min-height: 130px; font-size: 1.2rem; line-height: 1.8; padding: 12px 14px; border: 2px solid var(--border); border-radius: 10px; resize: vertical; font-family: inherit; background: #FAFCFF; color: var(--text-dark); transition: border-color 0.2s; }
  .whiteboard:focus { outline: none; border-color: var(--blue-accent); }
  .whiteboard::placeholder { color: var(--text-light); font-style: italic; font-size: 0.97rem; }
  .wb-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .table-input { width: 100%; border: 1.5px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 0.93rem; font-family: inherit; background: #FAFCFF; color: var(--text-dark); transition: border-color 0.2s; }
  .table-input:focus { outline: none; border-color: var(--blue-accent); }

  /* NOTES PANEL */
  #notes-panel { background: var(--amber-light); border-top: 2px solid #F59E0B; flex-shrink: 0; }
  #notes-toggle { width: 100%; padding: 7px 24px; background: transparent; border: none; cursor: pointer; font-size: 0.83rem; font-weight: 700; text-align: left; display: flex; justify-content: space-between; align-items: center; color: var(--amber); font-family: inherit; }
  #notes-toggle:hover { background: rgba(245,158,11,0.1); }
  #notes-content { padding: 10px 28px 14px; font-size: 0.86rem; line-height: 1.7; max-height: 200px; overflow-y: auto; color: #78350F; }
  #notes-content ul { padding-left: 18px; }
  #notes-content li { margin-bottom: 5px; }
  #notes-content strong { color: var(--amber); }
  #notes-content .script { background: #FFFBEB; border-left: 3px solid #F59E0B; padding: 8px 12px; border-radius: 0 6px 6px 0; margin: 8px 0; font-style: italic; }
  #notes-content .bridge { background: #FEF9C3; border-left: 3px solid #EAB308; padding: 8px 12px; border-radius: 0 6px 6px 0; margin-top: 8px; }
  #notes-content table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 0.82rem; }
  #notes-content table th { background: #78350F; color: white; padding: 6px 10px; text-align: left; }
  #notes-content table td { padding: 6px 10px; border-bottom: 1px solid #FDE68A; vertical-align: top; }
  #notes-content table tr:nth-child(even) td { background: #FFFBEB; }

  /* NAV */
  #nav { background: var(--white); border-top: 1px solid var(--border); padding: 11px 32px; display: flex; gap: 10px; flex-shrink: 0; align-items: center; }
  .nav-btn { padding: 11px 24px; font-size: 0.97rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: all 0.2s; font-family: inherit; }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  #reset-btn { background: white; border: 2px solid #FCA5A5; color: #DC2626; font-size: 0.83rem; padding: 11px 14px; white-space: nowrap; }
  #reset-btn:hover { background: var(--red-light); }
  #prev-btn { background: var(--white); border: 2px solid var(--border); color: var(--text-mid); min-width: 100px; }
  #prev-btn:not(:disabled):hover { border-color: var(--blue-accent); color: var(--blue-accent); }
  #next-btn { background: var(--blue-mid); color: white; flex: 1; }
  #next-btn:not(:disabled):hover { background: var(--blue-dark); }
  #next-btn.finish { background: var(--green); }

  @media print { #notes-panel, #nav { display: none; } #header { background: white; color: black; border: none; } body, #app { height: auto; overflow: visible; } #main { overflow: visible; } }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-left">
      <div id="section-label"></div>
      <div id="page-title"></div>
    </div>
    <div id="progress-badge"></div>
  </div>
  <div id="main"></div>
  <div id="notes-panel">
    <button id="notes-toggle" onclick="toggleNotes()">
      <span>📋 主持人備忘（點此展開／收合，不影響投影）</span>
      <span id="notes-arrow">▼</span>
    </button>
    <div id="notes-content" style="display:none"></div>
  </div>
  <div id="nav">
    <button class="nav-btn" id="reset-btn" onclick="confirmReset()">↺ 全部重置</button>
    <button class="nav-btn" id="prev-btn" onclick="changePage(-1)">◀ 上一步</button>
    <button class="nav-btn" id="next-btn" onclick="changePage(1)">下一步 ▶</button>
  </div>
</div>

<script>
let currentPage = 0, whiteboardData = {}, notesOpen = false, revealCounts = {};
try { const s = localStorage.getItem('ai_club_s1_v4'); if(s){ const p=JSON.parse(s); whiteboardData=p.wb||{}; revealCounts=p.rc||{}; } } catch(e){}
function save(){ try{ localStorage.setItem('ai_club_s1_v4', JSON.stringify({wb:whiteboardData,rc:revealCounts})); }catch(e){} }
function confirmReset(){ if(confirm('確定要清除所有白板記錄和顯示狀態嗎？\n（此動作無法復原）')){ whiteboardData={}; revealCounts={}; localStorage.removeItem('ai_club_s1_v4'); renderPage(); } }
function toggleNotes(){ notesOpen=!notesOpen; document.getElementById('notes-content').style.display=notesOpen?'block':'none'; document.getElementById('notes-arrow').textContent=notesOpen?'▲':'▼'; }
function autoSave(){ const wb=document.getElementById('whiteboard'); if(wb){ whiteboardData[currentPage]=wb.value; save(); } }
function autoSaveKeyed(key){ const el=document.querySelector('[data-wbkey="'+key+'"]'); if(el){ whiteboardData[key]=el.value; save(); } }
function revealNext(pi,tot){ const c=(revealCounts[pi]||0)+1; revealCounts[pi]=c; save(); const item=document.getElementById('reveal-'+(c-1)); if(item) item.classList.add('visible'); const btn=document.getElementById('reveal-btn'),ctr=document.getElementById('reveal-counter'); if(c>=tot){btn.disabled=true;btn.textContent='✓ 全部顯示';} if(ctr) ctr.textContent=`已顯示 ${c} / ${tot}`; }
function resetReveal(pi,tot){ revealCounts[pi]=0; save(); for(let i=0;i<tot;i++){ const it=document.getElementById('reveal-'+i); if(it) it.classList.remove('visible'); } const btn=document.getElementById('reveal-btn'),ctr=document.getElementById('reveal-counter'); if(btn){btn.disabled=false;btn.textContent='顯示下一個問題 ▶';} if(ctr) ctr.textContent=`已顯示 0 / ${tot}`; }
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const PAGES = [

// ══ 1 / 14  封面 ══════════════════════════════════════════════
{
  section:'歡迎',title:'課程封面',
  notes:`<ul>
    <li><strong>開場前確認：</strong>投影機連線、助手就位、麥克風音量</li>
    <li><strong>提醒自己三件事：</strong></li>
    <li>① 你是主持人，不是講師——不需要有答案，只需要整理大家說的話</li>
    <li>② 沉默是正常的——30 秒的停頓比你想像中短，不要急著填空</li>
    <li>③ 踩雷的經驗最有價值——明確鼓勵大家說失敗，失敗才有東西討論</li>
  </ul>`,
  render:()=>`
  <div class="card"><div class="cover-wrap">
    <div class="cover-eyebrow">電光所 AI 技術讀書會</div>
    <div class="cover-title">AI 深度研究 × 精準簡報製作</div>
    <div class="cover-subtitle">主題一・第一場</div>
    <div class="cover-meta"><span>📅 60 分鐘</span><span>👥 電光所工程師・10 組</span><span>🎙 主持人：PEPSI</span></div>
    <div class="cover-divider"></div>
    <div class="goals-list">
      <div style="font-size:0.78rem;font-weight:700;color:var(--text-light);letter-spacing:0.1em;margin-bottom:8px;">TODAY'S GOAL</div>
      <div class="goal-item"><div class="goal-num">1</div><div>把大家現在怎麼用 AI 處理技術資料的狀況攤開來</div></div>
      <div class="goal-item"><div class="goal-num">2</div><div>決定第二堂課每組要準備什麼</div></div>
      <div class="goal-item"><div class="goal-num">3</div><div>10 組各分享 5（報告）+3（QA）分鐘，你花 90 分鐘學到 10 種不同的流程</div></div>
    </div>
  </div></div>`
},

// ══ 2 / 14  議程總覽 ══════════════════════════════════════════
{
  section:'課程架構',title:'今日議程',
  notes:`<ul>

function copyAll(){
  const date=new Date().toLocaleDateString('zh-TW');
  let text=`AI 讀書會第一場・今日課堂紀錄\n日期：${date}\n${'═'.repeat(40)}\n\n`;
  text+=`【開場破冰・各組工具與情境】\n${whiteboardData[3]||'（無記錄）'}\n\n`;
  text+=`【現況攤牌・問題 1】\n${whiteboardData['5_q0']||'（無記錄）'}\n\n`;
  text+=`【現況攤牌・問題 2】\n${whiteboardData['5_q1']||'（無記錄）'}\n\n`;
  text+=`【現況攤牌・問題 3】\n${whiteboardData['5_q2']||'（無記錄）'}\n\n`;
  text+=`【痛點共鳴・AI 的問題】\n${whiteboardData['7_ai']||'（無記錄）'}\n\n`;
  text+=`【痛點共鳴・自己的問題】\n${whiteboardData['7_self']||'（無記錄）'}\n\n`;
  text+=`【工具角色對齊】\n拿到資料：${whiteboardData['9_s1']||'（未填）'}\n理解內容：${whiteboardData['9_s2']||'（未填）'}\n整理重點：${whiteboardData['9_s3']||'（未填）'}\n產出成品：${whiteboardData['9_s4']||'（未填）'}\n人工確認：永遠是人\n\n`;
  navigator.clipboard.writeText(text).then(()=>{
    const fb=document.getElementById('copy-feedback');
    if(fb){fb.classList.add('show');setTimeout(()=>fb.classList.remove('show'),2500);}
  }).catch(()=>alert('複製失敗，請手動選取文字後複製。'));
}

function changePage(dir){
  const wb=document.getElementById('whiteboard');
  if(wb){whiteboardData[currentPage]=wb.value;save();}
  const next=currentPage+dir;
  if(next>=0&&next<PAGES.length){currentPage=next;renderPage();document.getElementById('main').scrollTop=0;}
}

function renderPage(){
  const page=PAGES[currentPage];
  document.getElementById('section-label').textContent=page.section;
  document.getElementById('page-title').textContent=page.title;
  document.getElementById('progress-badge').textContent=`${currentPage+1} / ${PAGES.length}`;
  document.getElementById('notes-content').innerHTML=page.notes||'<p>（本頁無備忘）</p>';
  document.getElementById('main').innerHTML=page.render();
  const wb=document.getElementById('whiteboard');
  if(wb&&whiteboardData[currentPage]!==undefined) wb.value=whiteboardData[currentPage];
  document.querySelectorAll('[data-wbkey]').forEach(el=>{ const k=el.dataset.wbkey; if(whiteboardData[k]!==undefined) el.value=whiteboardData[k]; });
  const prev=document.getElementById('prev-btn'),next=document.getElementById('next-btn');
  prev.disabled=currentPage===0;
  if(currentPage===PAGES.length-1){
    next.textContent='完成課程';next.className='nav-btn finish';
    next.onclick=()=>alert('課程已完成！\n請使用「一鍵複製全部紀錄」儲存今日成果。');
  } else {
    next.textContent='下一步 ▶';next.className='nav-btn';
    next.onclick=()=>changePage(1);
  }
}

document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='TEXTAREA') return;
  if(e.key==='ArrowRight'||e.key==='PageDown') changePage(1);
  if(e.key==='ArrowLeft'||e.key==='PageUp') changePage(-1);
});

renderPage();
</script>
